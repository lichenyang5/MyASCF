<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ASCF Runtime Lab</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f5f6f8;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
    }

    .page {
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin: 0;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 8px;
    }

    .stage {
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      margin: 0;
    }

    .chain {
      font-size: 13px;
      line-height: 1.7;
      color: #2563eb;
      background: #eff6ff;
      border-radius: 12px;
      padding: 12px 14px;
      word-break: break-all;
    }

    .btn-disabled {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #e5e7eb;
      color: #9ca3af;
      font-size: 15px;
      font-weight: 600;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      color: #2563eb;
      background: #dbeafe;
      border-radius: 999px;
      padding: 2px 10px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <span class="tag">Stage 1 · Step 1</span>
      <h1 class="title">ASCF Runtime Lab</h1>
      <p class="subtitle">HarmonyOS · ArkWeb · Local H5</p>
    </div>

    <div class="card">
      <p class="card-title">当前阶段</p>
      <p class="stage">
        只验证 ArkWeb 能加载 H5 页面，暂不接入 JavaScriptProxy。
      </p>
    </div>

    <div class="card">
      <p class="card-title">当前链路</p>
      <p class="chain">
        ArkTS Web 组件 → ArkWeb → rawfile/h5/index.html → H5 页面渲染
      </p>
    </div>

    <button class="btn-disabled" disabled>
      下一步接入 JavaScriptProxy
    </button>

    <p class="footer">
      Step 1 passed if you can see this page in ArkWeb.
    </p>
  </div>
</body>
</html>
